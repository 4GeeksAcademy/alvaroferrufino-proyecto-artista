<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Escena vintage de joven tocando guitarra en un bar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a2a23" />
      <stop offset="1" stop-color="#1a1411" />
    </linearGradient>
    <radialGradient id="light" cx="52%" cy="18%" r="45%">
      <stop offset="0" stop-color="#f0c07a" stop-opacity="0.6" />
      <stop offset="1" stop-color="#f0c07a" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6d4a34" />
      <stop offset="1" stop-color="#4a3124" />
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)" />
  <rect width="1200" height="800" fill="url(#light)" />

  <rect x="80" y="520" width="1040" height="200" rx="16" fill="url(#wood)" opacity="0.9" />

